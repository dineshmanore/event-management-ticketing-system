<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Center | ShowNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-shell">
  <button class="back-chip" onclick="goBack('index.html')">← Back</button>
  <section class="contact-container help-page">
    <div class="contact-info">
      <h2>Help & Support</h2>
      <p>Need support with bookings, refunds or payments? Reach out and we will help instantly.</p>
      <div class="info-item">📧 support@shownest.com</div>
      <div class="info-item">📞 +91 90000 12345</div>
      <div class="info-item">📍 Pune, Maharashtra</div>
    </div>
    <div class="contact-form">
      <h3>Submit a request</h3>
      <form>
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea rows="5" placeholder="How can we help?" required></textarea>
        <button type="submit">Send Request</button>
      </form>
    </div>
  </section>
</div>
<script src="js/script.js"></script>
</body>
</html>
