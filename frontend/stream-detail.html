<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Detail — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
  <style>
    body { background: #0f1014; color: white; }
    .stream-banner-wrap { position: relative; height: 500px; background: #000; overflow: hidden; }
    .stream-banner-bg { position: absolute; inset: 0; background-size: cover; background-position: center top; filter: brightness(0.3); }
    .stream-banner-content { position: relative; z-index: 2; display: flex; align-items: flex-end; height: 100%; padding: 0 40px 40px; gap: 40px; }
    .stream-poster-main { width: 180px; height: 260px; object-fit: cover; border-radius: 12px; flex-shrink: 0; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
    .stream-main-info { flex: 1; }
    .stream-main-info h1 { font-size: 38px; font-weight: 800; margin-bottom: 12px; line-height: 1.2; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .stream-rating-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; font-size: 14px; color: #ccc; }
    .rating-big { padding: 4px 12px; background: rgba(255,255,255,0.1); border-radius: 20px; color: white; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); }
    .rating-big i { color: #f5c518; margin-right: 6px; }
    .stream-meta { opacity: 0.8; font-weight: 500; }
    .stream-desc { max-width: 600px; font-size: 15px; line-height: 1.6; color: #b3b3b3; margin-bottom: 30px; }
    .action-row { display: flex; gap: 16px; align-items: center; }
    .btn-buy { background: #1dc26b; color: #fff; border: none; padding: 16px 32px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-buy:hover { background: #17a058; }
    .btn-rent { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 16px 32px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-rent:hover { background: rgba(255,255,255,0.2); }
    .btn-trailer { background: #cc0c39; color: white; border: none; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 15px rgba(204,12,57,0.4); }
    .btn-trailer:hover { background: #a50930; }
    .trailer-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .trailer-modal.open { display: flex; }
    .trailer-box { width: min(980px, 100%); background: #111; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .trailer-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #17181f; color: #fff; font-size: 14px; font-weight: 600; }
    .trailer-close { border: none; background: transparent; color: #fff; font-size: 22px; cursor: pointer; line-height: 1; }
    .trailer-frame-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
    .trailer-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>

<header id="header"></header>

<div class="stream-banner-wrap" id="bannerWrap">
  <div class="stream-banner-bg" id="bannerBg"></div>
  <div class="stream-banner-content">
    <img id="mainPoster" class="stream-poster-main" src="" alt="Poster"
         onerror="this.src='https://via.placeholder.com/180x260/222/555?text=No+Poster'">
    <div class="stream-main-info">
      <h1 id="streamTitle">Loading...</h1>
      <div class="stream-rating-row">
        <span class="rating-big"><i class="fa fa-star"></i><span id="streamRating">0</span>/10</span>
        <span class="stream-meta" id="streamGenres"></span>
        <i class="fa fa-circle" style="font-size:4px;opacity:0.5"></i>
        <span class="stream-meta" id="streamDuration"></span>
        <i class="fa fa-circle" style="font-size:4px;opacity:0.5"></i>
        <span class="stream-meta" id="streamLang"></span>
      </div>
      <p class="stream-desc" id="streamDesc">Loading overview...</p>
      <div class="action-row">
        <button class="btn-trailer" onclick="playTrailer()"><i class="fa fa-play"></i></button>
        <button class="btn-rent" id="btnRent" onclick="buyStream('Rent')">Rent ₹0</button>
        <button class="btn-buy" id="btnBuy" onclick="buyStream('Buy')">Buy ₹0</button>
      </div>
    </div>
  </div>
</div>

<div id="trailerModal" class="trailer-modal" onclick="closeTrailer(event)">
  <div class="trailer-box" onclick="event.stopPropagation()">
    <div class="trailer-head">
      <span id="trailerTitle">Trailer</span>
      <button class="trailer-close" onclick="closeTrailer()">&times;</button>
    </div>
    <div class="trailer-frame-wrap" id="trailerFrameWrap"></div>
  </div>
</div>

<footer id="footer"></footer>

<script src="components/header.js"></script>
<script src="components/footer.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pathParts = window.location.pathname.split('/').filter(Boolean);
const lastPart = pathParts[pathParts.length - 1] || '';
const pathId = /^\d+$/.test(lastPart) ? lastPart : null;
const id = params.get('id') || pathId;
let streamData = null;

if (!id) {
  document.body.innerHTML = '<div style="padding:100px;text-align:center;color:white"><h2>Missing stream ID</h2><a href="stream" style="color:#cc0c39">Go Back</a></div>';
  throw new Error('Missing stream id');
}

async function loadStream() {
  try {
    const res = await fetch(`http://localhost:5000/api/stream/${id}`);
    if (!res.ok) throw new Error('Not found');
    const s = await res.json();
    streamData = s;
    
    document.title = `${s.title} — ShowTime Stream`;
    document.getElementById('streamTitle').innerText = s.title;
    document.getElementById('streamRating').innerText = s.rating || 0;
    document.getElementById('streamGenres').innerText = s.genres || 'Drama';
    document.getElementById('streamDuration').innerText = s.duration ? `${s.duration} mins` : '120 mins';
    document.getElementById('streamLang').innerText = s.language || 'English';
    document.getElementById('streamDesc').innerText = s.description || 'No description available for this stream.';
    
    document.getElementById('btnRent').innerHTML = `<i class="fa fa-ticket-alt"></i>Rent ₹${s.price_rent}`;
    document.getElementById('btnBuy').innerHTML = `<i class="fa fa-shopping-cart"></i>Buy ₹${s.price_buy}`;
    
    document.getElementById('mainPoster').src = s.poster_image || '';
    document.getElementById('bannerBg').style.backgroundImage = `url(${s.banner_image || s.poster_image || ''})`;
    
  } catch(e) {
    document.body.innerHTML = '<div style="padding:100px;text-align:center;color:white"><h2>Stream Not Found</h2><a href="stream" style="color:#cc0c39">Go Back</a></div>';
  }
}

function buyStream(type) {
  if (!localStorage.getItem('token')) {
    alert("Please log in to purchase streams.");
    window.location.href = "login.html";
    return;
  }
  alert(`Successfully processed ${type} request! This feature is in beta.`);
}

function toEmbedUrl(url) {
  if (!url) return '';

  // YouTube formats
  const ytWatch = url.match(/youtube\.com\/watch\?v=([^&]+)/i);
  const ytShort = url.match(/youtu\.be\/([^?&]+)/i);
  const ytEmbed = url.match(/youtube\.com\/embed\/([^?&]+)/i);
  const ytId = (ytWatch && ytWatch[1]) || (ytShort && ytShort[1]) || (ytEmbed && ytEmbed[1]);
  if (ytId) return `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&playsinline=1&mute=0`;

  // Vimeo format
  const vimeo = url.match(/vimeo\.com\/(\d+)/i);
  if (vimeo && vimeo[1]) return `https://player.vimeo.com/video/${vimeo[1]}?autoplay=1&muted=0`;

  // Allow pre-embedded links and generic video urls as-is
  return url;
}

function isDirectVideoUrl(url) {
  return /\.(mp4|webm|ogg)(\?.*)?$/i.test(url || '');
}

function playTrailer() {
  const trailerUrl = streamData && streamData.trailer_url ? String(streamData.trailer_url).trim() : '';
  if (!trailerUrl) {
    alert('Trailer is not available for this stream yet.');
    return;
  }

  const modal = document.getElementById('trailerModal');
  const wrap = document.getElementById('trailerFrameWrap');
  const titleEl = document.getElementById('trailerTitle');
  const embedUrl = toEmbedUrl(trailerUrl);

  titleEl.innerText = `${streamData.title || 'Stream'} — Trailer`;
  if (isDirectVideoUrl(trailerUrl)) {
    wrap.innerHTML = `<video src="${trailerUrl}" controls autoplay playsinline style="position:absolute;inset:0;width:100%;height:100%;background:#000"></video>`;
  } else {
    wrap.innerHTML = `<iframe src="${embedUrl}" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
  }
  modal.classList.add('open');
}

function closeTrailer(e) {
  if (e && e.target && e.target.id !== 'trailerModal') return;
  const modal = document.getElementById('trailerModal');
  const wrap = document.getElementById('trailerFrameWrap');
  wrap.innerHTML = '';
  modal.classList.remove('open');
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeTrailer();
});

loadStream();
</script>
</body>
</html>
