<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/auth.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="auth-page">

  <!-- LEFT SIDE -->
  <div class="auth-left">
    <div class="brand">
      <div class="logo-box">ST</div>
      <span class="logo-name">ShowTime</span>
    </div>
    <h2>Welcome Back!</h2>
    <p>Sign in to book tickets for movies, events, plays, sports and more.</p>

    <div class="auth-features">
      <div class="auth-feature">
        <i class="fa fa-ticket-alt"></i>
        <span>Instant ticket booking</span>
      </div>
      <div class="auth-feature">
        <i class="fa fa-history"></i>
        <span>View your booking history</span>
      </div>
      <div class="auth-feature">
        <i class="fa fa-bell"></i>
        <span>Get personalized recommendations</span>
      </div>
      <div class="auth-feature">
        <i class="fa fa-shield-alt"></i>
        <span>100% secure payments</span>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="auth-right">
    <div class="auth-card">
      <h3>Sign In</h3>
      <p class="auth-sub">Enter your credentials to continue</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button class="auth-btn" onclick="login()">Continue</button>

      <div class="auth-divider"><span>OR</span></div>

      <div id="g_id_onload"
           data-client_id="771897370994-i74ucfjqpj0g0h36kvd66g8vku36qjln.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleGoogleResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="outline"
           data-text="continue_with"
           data-size="large"
           data-logo_alignment="left"
           style="width: 100%; display: flex; justify-content: center; margin-bottom: 20px;">
      </div>

      <div class="auth-footer">
        New to ShowTime? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

</div>


</body>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</html>
