<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/category-pages.css">
  <link rel="stylesheet" href="styles/cards.css">
  <style>
    .stream-hero { background: linear-gradient(135deg,#0a0a1a,#1a0a2e); padding: 50px 40px; color: white; }
    .stream-hero h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
    .stream-hero p { font-size: 15px; opacity: .7; }
    .stream-section { margin-bottom: 40px; }
    .stream-section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .stream-section-title h2 { font-size: 20px; font-weight: 700; color: #fff; }
    .stream-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
    .s-card { cursor: pointer; border-radius: 10px; overflow: hidden; position: relative; transition: transform .2s; background: #111; }
    .s-card:hover { transform: scale(1.03); }
    .s-card img { width: 100%; height: 270px; object-fit: cover; display: block; }
    .s-card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 14px; background: linear-gradient(to top, rgba(0,0,0,.95) 0%, transparent 100%); color: white; }
    .s-card-overlay .st { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
    .s-card-overlay .sg { font-size: 12px; opacity: .8; }
    .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; background: rgba(204,12,57,.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; opacity: 0; transition: opacity .2s; }
    .s-card:hover .play-overlay { opacity: 1; }
    .new-badge { position: absolute; top: 8px; left: 8px; background: #cc0c39; color: white; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; box-shadow: 0 4px 10px rgba(204,12,57,0.4); }
    .rent-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
  </style>
</head>
<body style="background: #111;"> <!-- Stream pages often have dark backgrounds -->

<header id="header"></header>

<main id="app-content">
<div class="stream-hero" id="streamHero">
  <h1><i class="fa fa-play-circle" style="margin-right:12px;color:#cc0c39"></i>Stream</h1>
  <p>The best movies and shows, available to rent or buy instantly.</p>
</div>

<div class="content-wrap" style="padding: 40px;">
  <div id="streamContent"></div>
</div>
</main>

<footer id="footer"></footer>

<script src="components/header.js"></script>
<script src="components/footer.js"></script>
<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:5000/api'
  : 'https://event-management-ticketing-system.onrender.com/api';

async function init() {
  try {
    const res = await fetch(`${API}/stream`);
    const streams = await res.json();
    renderContent(streams);
  } catch(e) {
    document.getElementById('streamContent').innerHTML = `<div class="empty-state" style="color:#aaa"><i class="fa fa-play-circle" style="font-size:48px;margin-bottom:16px;color:#cc0c39"></i><h3>Streaming platform offline</h3><p>We're bringing it back shortly!</p></div>`;
  }
}

function renderContent(list) {
  const c = document.getElementById('streamContent');
  if (!list || list.length === 0) {
    c.innerHTML = `<div class="empty-state" style="color:#aaa;background:#1a1a1a;border:none"><i class="fa fa-film" style="font-size:48px;margin-bottom:16px;color:#444"></i><h3>No stream items</h3><p>Check back later for new releases.</p></div>`;
    return;
  }

  c.innerHTML = `
    <div class="stream-section">
      <div class="stream-section-title"><h2>🔥 Premiering on Stream</h2></div>
      <div class="stream-row">${list.map((m, i) => streamCard(m, i < 4)).join('')}</div>
    </div>
  `;
}

function openStream(id) {
  if (!id) return;
  // Use extension-less route to match apps served with clean URLs.
  window.location.href = `stream-detail?id=${encodeURIComponent(id)}`;
}

function streamCard(m, isNew) {
  const rentBadge = m.price_rent > 0 ? `<div class="rent-badge">Rent ₹${m.price_rent}</div>` : '';
  
  return `
  <div class="s-card" onclick="openStream('${m.id}')">
    <img src="${m.poster_image || 'https://via.placeholder.com/300x450/222/555'}" alt="${m.title}"
         onerror="this.src='https://via.placeholder.com/300x450/222/555?text=No+Poster'">
    ${isNew ? '<div class="new-badge">PREMIERE</div>' : ''}
    ${rentBadge}
    <div class="play-overlay"><i class="fa fa-play"></i></div>
    <div class="s-card-overlay">
      <div class="st">${m.title}</div>
      <div class="sg">${m.genres || 'Drama'} • ${m.language || 'English'}</div>
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
