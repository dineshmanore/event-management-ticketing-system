<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/category-pages.css">
  <link rel="stylesheet" href="styles/cards.css">
  <style>
    .stream-hero { background: linear-gradient(135deg,#0a0a1a,#1a0a2e); padding: 50px 40px; color: white; }
    .stream-hero h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
    .stream-hero p { font-size: 15px; opacity: .7; }
    .stream-platform-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .platform-chip { display: flex; align-items: center; gap: 8px; padding: 8px 18px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: white; transition: all .2s; }
    .platform-chip:hover, .platform-chip.active { background: #cc0c39; border-color: #cc0c39; }
    .stream-section { margin-bottom: 40px; }
    .stream-section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .stream-section-title h2 { font-size: 20px; font-weight: 700; }
    .stream-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
    .stream-row::-webkit-scrollbar { display: none; }
    .s-card { flex-shrink: 0; width: 180px; cursor: pointer; border-radius: 10px; overflow: hidden; position: relative; transition: transform .2s; background: #111; }
    .s-card:hover { transform: scale(1.05); }
    .s-card img { width: 180px; height: 270px; object-fit: cover; display: block; }
    .s-card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 10px 10px; background: linear-gradient(to top, rgba(0,0,0,.95) 0%, transparent 100%); color: white; }
    .s-card-overlay .st { font-size: 13px; font-weight: 700; }
    .s-card-overlay .sg { font-size: 11px; opacity: .65; margin-top: 2px; }
    .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; background: rgba(255,255,255,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; opacity: 0; transition: opacity .2s; }
    .s-card:hover .play-overlay { opacity: 1; }
    .platform-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.7); color: white; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; }
    .new-badge { position: absolute; top: 8px; left: 8px; background: #cc0c39; color: white; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; }
  </style>
</head>
<body>

<header id="header"></header>

<div class="stream-hero">
  <h1><i class="fa fa-play-circle" style="margin-right:12px;color:#cc0c39"></i>Stream</h1>
  <p>Watch movies and shows online — new releases every Friday</p>
  <div class="stream-platform-row">
    <div class="platform-chip active" onclick="setPlatform(this,'all')"><i class="fa fa-globe"></i>All Platforms</div>
    <div class="platform-chip" onclick="setPlatform(this,'netflix')">Netflix</div>
    <div class="platform-chip" onclick="setPlatform(this,'prime')">Prime Video</div>
    <div class="platform-chip" onclick="setPlatform(this,'hotstar')">Disney+ Hotstar</div>
    <div class="platform-chip" onclick="setPlatform(this,'zee5')">ZEE5</div>
    <div class="platform-chip" onclick="setPlatform(this,'sonyliv')">SonyLIV</div>
  </div>
</div>

<div class="filter-strip">
  <label>Genre:</label>
  <button class="filter-chip active" onclick="filterGenre(this,'all')">All</button>
  <button class="filter-chip" onclick="filterGenre(this,'Action')">Action</button>
  <button class="filter-chip" onclick="filterGenre(this,'Drama')">Drama</button>
  <button class="filter-chip" onclick="filterGenre(this,'Comedy')">Comedy</button>
  <button class="filter-chip" onclick="filterGenre(this,'Thriller')">Thriller</button>
  <button class="filter-chip" onclick="filterGenre(this,'Horror')">Horror</button>
  <button class="filter-chip" onclick="filterGenre(this,'Romance')">Romance</button>
</div>

<div class="search-row">
  <i class="fa fa-search" style="color:#aaa"></i>
  <input class="search-input" placeholder="Search movies and shows..." oninput="searchStream(this.value)">
</div>

<div class="content-wrap">
  <div id="streamContent"></div>
</div>

<footer id="footer"></footer>

<script src="components/header.js"></script>
<script src="components/footer.js"></script>
<script>
const API = 'http://localhost:5000/api';
let allMovies = [], activeGenre = 'all', activePlatform = 'all';

// Randomly assign streaming platforms to movies for demo
const platforms = ['netflix','prime','hotstar','zee5','sonyliv'];
function assignPlatform(id) { return platforms[id % platforms.length]; }
const platformLabel = { netflix:'N', prime:'P', hotstar:'D+', zee5:'Z5', sonyliv:'SL' };
const platformColor = { netflix:'#e50914', prime:'#00a8e1', hotstar:'#1f80e0', zee5:'#2b69b3', sonyliv:'#0055a5' };

async function init() {
  try {
    const res = await fetch(`${API}/movies`);
    allMovies = await res.json();
    render();
  } catch(e) {
    document.getElementById('streamContent').innerHTML = `<div class="empty-state"><i class="fa fa-play-circle"></i><h3>Streaming content coming soon!</h3></div>`;
  }
}

function render() {
  let list = [...allMovies];
  if (activeGenre !== 'all') list = list.filter(m => m.genre && m.genre.includes(activeGenre));
  if (activePlatform !== 'all') list = list.filter(m => assignPlatform(m.id) === activePlatform);

  const c = document.getElementById('streamContent');
  if (!list.length) {
    c.innerHTML = `<div class="empty-state"><i class="fa fa-film"></i><h3>No results</h3><p>Try a different genre or platform.</p></div>`;
    return;
  }

  // Group into sections
  const newReleases = list.slice(0, 6);
  const trending    = [...list].sort((a,b) => b.votes - a.votes).slice(0, 8);
  const topRated    = [...list].sort((a,b) => b.rating - a.rating).slice(0, 8);

  c.innerHTML = `
    <div class="stream-section">
      <div class="stream-section-title"><h2>🔥 New Releases</h2><a href="#" style="color:#cc0c39;font-size:13px;font-weight:600">See All</a></div>
      <div class="stream-row">${newReleases.map((m,i) => streamCard(m, i<3)).join('')}</div>
    </div>
    <div class="stream-section">
      <div class="stream-section-title"><h2>📈 Trending Now</h2></div>
      <div class="stream-row">${trending.map(m => streamCard(m,false)).join('')}</div>
    </div>
    <div class="stream-section">
      <div class="stream-section-title"><h2>⭐ Top Rated</h2></div>
      <div class="stream-row">${topRated.map(m => streamCard(m,false)).join('')}</div>
    </div>`;
}

function streamCard(m, isNew=false) {
  const plat  = assignPlatform(m.id);
  const platL = platformLabel[plat];
  const platC = platformColor[plat];
  return `<div class="s-card" onclick="alert('${m.title} — Stream on ${plat.charAt(0).toUpperCase()+plat.slice(1)}\\n\\nWatch on the platform\\'s app or website.')">
    <img src="${m.poster}" alt="${m.title}"
         onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(160deg,#1a0a2e,#111)'">
    ${isNew ? '<div class="new-badge">NEW</div>' : ''}
    <div class="platform-badge" style="background:${platC}">${platL}</div>
    <div class="play-overlay"><i class="fa fa-play"></i></div>
    <div class="s-card-overlay">
      <div class="st">${m.title}</div>
      <div class="sg">${m.genre||''}</div>
    </div>
  </div>`;
}

function filterGenre(btn, genre) {
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  activeGenre = genre;
  render();
}

function setPlatform(btn, p) {
  document.querySelectorAll('.platform-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  activePlatform = p;
  render();
}

function searchStream(q) {
  if (!q.trim()) { render(); return; }
  const f = allMovies.filter(m => m.title.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('streamContent').innerHTML = `
    <p style="color:#888;margin-bottom:20px;font-size:14px"><strong>${f.length}</strong> results for "${q}"</p>
    <div class="stream-row">${f.map(m=>streamCard(m,false)).join('')}</div>`;
}

init();
</script>
</body>
</html>
