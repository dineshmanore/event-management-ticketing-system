<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying Email — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    body{font-family:'Poppins',sans-serif;background:#f8f9fa;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#333}
    .card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.05);text-align:center;max-width:400px;width:90%;border:1px solid #eee}
    .icon{font-size:48px;margin-bottom:20px}
    .icon.loading{color:#cc0c39;animation:spin 2s linear infinite}
    .icon.success{color:#1dc26b}
    .icon.error{color:#e53e3e}
    h1{font-size:22px;margin-bottom:12px;font-weight:700}
    p{color:#666;font-size:14px;line-height:1.6;margin-bottom:24px}
    .btn{background:#cc0c39;color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s}
    .btn:hover{background:#a50930;transform:translateY(-2px)}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon loading"><i class="fa fa-spinner fa-spin"></i></div>
    <h1>Verifying Your Email...</h1>
    <p>Please wait while we confirm your new email address.</p>
  </div>

  <script>
    var API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5000/api'
      : 'https://event-management-ticketing-system.onrender.com/api';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function verify() {
      const card = document.getElementById('card');
      if (!token) {
        showError('Invalid Link', 'No verification token was provided. Please check the link in your email.');
        return;
      }

      try {
        const res = await fetch(`${API}/auth/verify-email-change/${token}`);
        const data = await res.json();

        if (res.ok) {
          showSuccess('Email Verified!', 'Your email address has been successfully updated. You can now use your new email to log in.');
        } else {
          showError('Verification Failed', data.message || 'The verification link may have expired or is invalid.');
        }
      } catch (e) {
        showError('System Error', 'Something went wrong on our end. Please try again later.');
      }
    }

    function showSuccess(title, msg) {
      card.innerHTML = `
        <div class="icon success"><i class="fa fa-check-circle"></i></div>
        <h1>${title}</h1>
        <p>${msg}</p>
        <a href="login.html" class="btn">Return to Login</a>
      `;
    }

    function showError(title, msg) {
      card.innerHTML = `
        <div class="icon error"><i class="fa fa-times-circle"></i></div>
        <h1>${title}</h1>
        <p>${msg}</p>
        <a href="profile.html" class="btn">Back to Profile</a>
      `;
    }

    verify();
  </script>
</body>
</html>
