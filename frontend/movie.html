<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/cards.css">
  <style>
    .movie-banner-wrap {
      position: relative;
      height: 460px;
      background: #000;
      overflow: hidden;
    }
    .movie-banner-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.45) 42%, rgba(0,0,0,0.2) 100%);
      z-index: 1;
      pointer-events: none;
    }
    .movie-banner-wrap::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 86px;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.05) 62%,
        rgba(255,255,255,0.2) 100%
      );
      z-index: 2;
      pointer-events: none;
    }
    .movie-banner-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      filter: brightness(0.62);
      transform: scale(1.04);
    }
    .movie-banner-content {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      height: 100%;
      padding: 0 40px 36px;
      gap: 30px;
    }
    .movie-poster-main {
      width: 168px;
      height: 248px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
      box-shadow: 0 12px 36px rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.22);
    }
    .movie-main-info { color: white; flex: 1; }
    .movie-main-info h1 { font-size: 42px; font-weight: 800; margin-bottom: 10px; line-height: 1.15; text-shadow: 0 6px 22px rgba(0,0,0,0.45); }
    .movie-rating-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .rating-big { font-size: 34px; font-weight: 800; color: #20d07d; letter-spacing: -0.5px; }
    .rating-big i { color: #f84464; margin-right: 4px; }
    .votes-text { font-size: 14px; color: rgba(255,255,255,0.8); }
    .movie-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .movie-tag {
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.96);
      background: rgba(0,0,0,0.25);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .book-tickets-btn {
      background: #cc0c39;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: background 0.2s;
    }
    .book-tickets-btn:hover { background: #a50930; }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .watch-trailer-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
    }
    .watch-trailer-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #fff;
    }
    .trailer-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.86);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .trailer-modal.open { display: flex; }
    .trailer-box {
      width: min(980px, 100%);
      background: #111;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .trailer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #17181f;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }
    .trailer-close {
      border: none;
      background: transparent;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    .trailer-frame-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }
    .trailer-frame-wrap iframe,
    .trailer-frame-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    .movie-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #e8e8e8;
      margin: -22px 40px 0;
      padding-top: 0;
      background: #fff;
      position: relative;
      z-index: 5;
      border-radius: 12px 12px 0 0;
      box-shadow: 0 8px 24px rgba(0,0,0,0.07);
      padding-left: 8px;
    }
    .movie-tab {
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      color: #888;
      transition: all 0.2s;
    }
    .movie-tab.active { color: #cc0c39; border-bottom-color: #cc0c39; }
    .tab-content { display: none; padding: 26px 40px 30px; background: white; }
    .tab-content.active { display: block; }
    .about-section h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: #2d2d2d; }
    .about-section p { font-size: 14px; line-height: 1.8; color: #555; }
    .cast-grid { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; }
    .cast-card { flex-shrink: 0; text-align: center; width: 100px; }
    .cast-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 8px;
      border: 3px solid #e0e0e0;
    }
    .cast-name { font-size: 13px; font-weight: 600; }
    .cast-role { font-size: 11px; color: #888; }
    .similar-section { padding: 0 40px 40px; background: #f8f8f8; }
    .similar-section h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; padding-top: 30px; }
  </style>
</head>
<body>

<header id="header"></header>

<div class="movie-banner-wrap" id="movieBanner">
  <div class="movie-banner-bg" id="bannerBg"></div>
  <div class="movie-banner-content">
    <img id="mainPoster" class="movie-poster-main" src="" alt="Movie Poster"
         onerror="this.src='https://via.placeholder.com/160x230/1a1a2e/white?text=No+Poster'">
    <div class="movie-main-info">
      <h1 id="movieTitle">Loading...</h1>
      <div class="movie-rating-row">
        <span class="rating-big"><i class="fa fa-star"></i><span id="movieRating">0</span>/10</span>
        <span class="votes-text"><span id="movieVotes">0</span> Votes</span>
      </div>
      <!-- FIX #2: movieTags is now populated in loadMovie() below -->
      <div class="movie-tags" id="movieTags"></div>
      <div class="hero-actions">
        <button class="watch-trailer-btn" onclick="watchTrailer()">
          <i class="fa fa-play" style="margin-right:8px"></i>Watch Trailer
        </button>
        <button class="book-tickets-btn" onclick="goToSeats()">Book Now</button>
      </div>
    </div>
  </div>
</div>

<!-- FIX #2: Added missing closing </div> tags — the white-background wrapper
     was never closed, causing similar-section to inherit white background
     and breaking the overall page layout. -->
<div style="background:white;">
  <div class="movie-tabs">
    <div class="movie-tab active" onclick="switchTab(this, 'about')">About</div>
    <div class="movie-tab" onclick="switchTab(this, 'cast')">Cast &amp; Crew</div>
  </div>

  <div id="about" class="tab-content active">
    <div class="about-section">
      <h3>About the Movie</h3>
      <p id="movieDesc">Loading description...</p>
    </div>
  </div>

  <div id="cast" class="tab-content">
    <div class="cast-grid" id="castGrid">
      <!-- cast cards injected by JS -->
    </div>
  </div>
  <!-- FIX: closing </div> for <div style="background:white;"> was missing -->
</div>

<div class="similar-section">
  <h2>You Might Also Like</h2>
  <div class="movie-row" id="similarMovies"></div>
</div>

<div id="trailerModal" class="trailer-modal" onclick="closeTrailer(event)">
  <div class="trailer-box" onclick="event.stopPropagation()">
    <div class="trailer-head">
      <span id="trailerTitle">Trailer</span>
      <button class="trailer-close" onclick="closeTrailer()">&times;</button>
    </div>
    <div class="trailer-frame-wrap" id="trailerFrameWrap"></div>
  </div>
</div>

<footer id="footer"></footer>

<script src="components/header.js"></script>
<script src="components/movieCard.js"></script>
<script src="components/footer.js"></script>
<script>
const API = 'http://localhost:5000/api';

const params  = new URLSearchParams(window.location.search);
let movieid = params.get('id');
let currentMovie = null;

// Fallback to localStorage if the URL query parameter was stripped by the server
if (!movieid) {
  movieid = localStorage.getItem('movieId');
}

// FIX #1: Save movieId to localStorage so seats.js can read it
if (!movieid) {
  window.location.href = 'index.html';
} else {
  localStorage.setItem('movieId', movieid);
}

function formatVotes(votes) {
  if (votes >= 1000000) return Math.round(votes / 1000000) + 'M+';
  if (votes >= 1000)    return Math.round(votes / 1000)    + 'K+';
  return votes;
}

async function loadMovie() {
  try {
    const res   = await fetch(`${API}/movies/${movieid}`);
    const movie = await res.json();
    currentMovie = movie;

    if (!movie || !movie.id) {
      document.body.innerHTML = '<div style="padding:80px;text-align:center"><h2>Movie not found</h2><a href="index.html">Go Home</a></div>';
      return;
    }

    // Title
    document.getElementById('movieTitle').innerText = movie.title;
    document.title = `${movie.title} — ShowTime`;

    // Rating & votes
    document.getElementById('movieRating').innerText = movie.rating || 0;
    document.getElementById('movieVotes').innerText  = formatVotes(movie.votes || 0);

    // FIX #2: Populate movie tags (genre + language chips) — was never done before
    const tagsContainer = document.getElementById('movieTags');
    const tags = [];
    if (movie.genre)    movie.genre.split(',').forEach(g => tags.push(g.trim()));
    if (movie.language) tags.push(movie.language);
    if (movie.rating)   tags.push(`★ ${movie.rating}`);
    tagsContainer.innerHTML = tags.map(t =>
      `<span class="movie-tag">${t}</span>`
    ).join('');

    // Description
    document.getElementById('movieDesc').innerText = movie.description || 'No description available.';

    // Poster
    const posterEl = document.getElementById('mainPoster');
    posterEl.src = movie.poster || '';

    // Banner background
    document.getElementById('bannerBg').style.backgroundImage =
      `url(${movie.banner || movie.poster || ''})`;

    // Cast
    const castContainer = document.getElementById('castGrid');
    if (movie.cast && movie.cast.length > 0) {
      castContainer.innerHTML = movie.cast.map(actor => `
        <div class="cast-card">
          <img class="cast-avatar"
               src="${actor.image || 'https://via.placeholder.com/80x80/e0e0e0/888?text=Actor'}"
               onerror="this.src='https://via.placeholder.com/80x80/e0e0e0/888?text=Actor'"
               alt="${actor.name}">
          <div class="cast-name">${actor.name}</div>
          <div class="cast-role">${actor.role || ''}</div>
        </div>
      `).join('');
    } else {
      castContainer.innerHTML = '<p style="color:#aaa;font-size:14px">No cast information available.</p>';
    }

  } catch (err) {
    console.error('loadMovie error:', err);
  }
}

function switchTab(el, tabId) {
  document.querySelectorAll('.movie-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// FIX #1: goToSeats also saves movieId so seats.js always has it
function goToSeats() {
  localStorage.setItem('movieId', movieid);
  window.location.href = `seats.html?id=${movieid}`;
}

function toEmbedUrl(url) {
  if (!url) return '';
  const ytWatch = url.match(/youtube\.com\/watch\?v=([^&]+)/i);
  const ytShort = url.match(/youtu\.be\/([^?&]+)/i);
  const ytEmbed = url.match(/youtube\.com\/embed\/([^?&]+)/i);
  const ytId = (ytWatch && ytWatch[1]) || (ytShort && ytShort[1]) || (ytEmbed && ytEmbed[1]);
  if (ytId) return `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&playsinline=1`;

  const vimeo = url.match(/vimeo\.com\/(\d+)/i);
  if (vimeo && vimeo[1]) return `https://player.vimeo.com/video/${vimeo[1]}?autoplay=1`;

  return url;
}

function isDirectVideoUrl(url) {
  return /\.(mp4|webm|ogg)(\?.*)?$/i.test(url || '');
}

function watchTrailer() {
  const trailer =
    (currentMovie && (currentMovie.trailer_url || currentMovie.trailer || currentMovie.trailerUrl)) || '';

  if (trailer) {
    const modal = document.getElementById('trailerModal');
    const wrap = document.getElementById('trailerFrameWrap');
    const titleEl = document.getElementById('trailerTitle');
    const embedUrl = toEmbedUrl(trailer);

    titleEl.innerText = `${(currentMovie && currentMovie.title) || 'Movie'} — Trailer`;
    if (isDirectVideoUrl(trailer)) {
      wrap.innerHTML = `<video src="${trailer}" controls autoplay playsinline></video>`;
    } else {
      wrap.innerHTML = `<iframe src="${embedUrl}" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
    }
    modal.classList.add('open');
    return;
  }

  alert('Trailer not available for this movie yet.');
}

function closeTrailer(e) {
  if (e && e.target && e.target.id !== 'trailerModal') return;
  const modal = document.getElementById('trailerModal');
  const wrap = document.getElementById('trailerFrameWrap');
  wrap.innerHTML = '';
  modal.classList.remove('open');
}

async function loadSimilarMovies() {
  try {
    const res    = await fetch(`${API}/movies`);
    const movies = await res.json();
    const container = document.getElementById('similarMovies');
    container.innerHTML = movies
      .filter(m => m.id != movieid)
      .slice(0, 6)
      .map(m => createMovieCard(m))
      .join('');
  } catch (err) {
    console.error('loadSimilarMovies error:', err);
  }
}

loadMovie();
loadSimilarMovies();
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeTrailer();
});
</script>
</body>
</html>
