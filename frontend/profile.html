<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
  <style>
    body { background: #f8f9fa; }
    .profile-wrap { max-width: 820px; margin: 0 auto; padding: 26px 20px 60px; }
    .profile-card { background: #fff; border: 1px solid #eee; border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    .profile-head { padding: 22px 24px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .profile-head h1 { font-size: 20px; font-weight: 800; margin: 0; }
    .muted { color: #777; font-size: 13px; }
    .profile-body { padding: 22px 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label { font-size: 13px; font-weight: 700; color: #444; }
    .field input { padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; font-family: 'Poppins', sans-serif; }
    .field input:focus { border-color: #cc0c39; }
    .field small { color: #888; font-size: 12px; }
    .full { grid-column: 1 / -1; }
    .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .btn { padding: 10px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Poppins', sans-serif; border: 1.5px solid #e0e0e0; background: #fff; }
    .btn.primary { background: #cc0c39; border-color: #cc0c39; color: #fff; }
    .btn.primary:hover { background: #a50930; border-color: #a50930; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header id="header"></header>

  <div class="page-header">
    <h1>My Profile</h1>
    <p>Update your account details</p>
  </div>

  <div class="profile-wrap">
    <div class="profile-card">
      <div class="profile-head">
        <div>
          <h1 id="pTitle">Profile</h1>
          <div class="muted" id="pMeta">Loading...</div>
        </div>
        <a href="dashboard.html" style="text-decoration:none;color:#cc0c39;font-weight:700;font-size:13px">← My Bookings</a>
      </div>
      <div class="profile-body">
        <div class="grid">
          <div class="field full">
            <label>Full name</label>
            <input id="pName" type="text" placeholder="Your name" />
          </div>
          <div class="field">
            <label>Email</label>
            <div style="display:flex;gap:10px">
              <input id="pEmail" type="email" placeholder="you@example.com" style="flex:1" />
              <button class="btn" id="verifyBtn" onclick="requestEmailVerify()" style="padding:0 14px;font-size:12px;white-space:nowrap;display:none">
                <i class="fa fa-paper-plane" style="margin-right:2px"></i> Verify
              </button>
            </div>
            <small id="emailHint">New email requires verification</small>
          </div>
          <div class="field">
            <label>Role</label>
            <input id="pRole" type="text" disabled style="background:#f5f5f5" />
            <small>Role is assigned by the system</small>
          </div>
          <div class="field full">
            <label>New password</label>
            <input id="pPassword" type="password" placeholder="Leave blank to keep current password" />
            <small>Minimum 6 characters</small>
          </div>
        </div>

        <div class="actions">
          <button class="btn" onclick="loadMe()">Reset</button>
          <button class="btn primary" id="saveBtn" onclick="saveMe()">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="components/header.js"></script>
  <script src="components/footer.js"></script>
  <script>
    var API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5000/api'
      : 'https://event-management-ticketing-system.onrender.com/api';

    async function loadMe() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }

      const res = await fetch(`${API}/auth/me`, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) {
        alert('Please login again.');
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
        return;
      }
      const me = await res.json();
      console.log('User Data:', me);

      const emailInput = document.getElementById('pEmail');
      const verifyBtn  = document.getElementById('verifyBtn');
      const emailHint  = document.getElementById('emailHint');

      document.getElementById('pName').value = me.name || '';
      emailInput.value = me.email || '';
      document.getElementById('pRole').value = me.role || 'user';
      document.getElementById('pPassword').value = '';
      document.getElementById('pMeta').innerText = `Member since ${me.created_at ? new Date(me.created_at).toLocaleDateString('en-IN') : '—'}`;
      document.getElementById('pTitle').innerText = me.name ? me.name : 'Profile';

      // Current email to track changes
      emailInput.dataset.original = me.email || '';
      
      emailInput.oninput = () => {
        const isChanged = emailInput.value.trim().toLowerCase() !== emailInput.dataset.original.toLowerCase();
        verifyBtn.style.display = isChanged ? 'block' : 'none';
        emailHint.innerText = isChanged ? 'Click Verify to update your email' : 'Your current email';
        emailHint.style.color = isChanged ? '#cc0c39' : '#888';
      };
    }

    async function requestEmailVerify() {
      const token = localStorage.getItem('token');
      const newEmail = document.getElementById('pEmail').value.trim();
      const verifyBtn = document.getElementById('verifyBtn');

      if (!newEmail) return alert('Please enter a new email address');
      
      verifyBtn.disabled = true;
      verifyBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> ...';

      try {
        const res = await fetch(`${API}/auth/request-email-change`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify({ newEmail })
        });
        const out = await res.json();
        if (!res.ok) throw new Error(out.message || 'Request failed');
        
        alert('A verification link has been sent to ' + newEmail + '. Please check your inbox and click the link to confirm the change.');
      } catch (e) {
        alert(e.message);
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = '<i class="fa fa-paper-plane"></i> Verify';
      }
    }

    async function saveMe() {
      const token = localStorage.getItem('token');
      const btn = document.getElementById('saveBtn');
      const emailInput = document.getElementById('pEmail');

      if (emailInput.value.trim().toLowerCase() !== emailInput.dataset.original.toLowerCase()) {
        alert('Please click the "Verify" button next to your email to update your email address. Other changes (name/password) will be saved now.');
      }

      btn.disabled = true;
      btn.innerText = 'Saving...';

      try {
        const payload = {
          name: document.getElementById('pName').value.trim(),
          // We don't send the email here anymore, it's handled by verification flow
          password: document.getElementById('pPassword').value
        };
        if (!payload.password) delete payload.password;

        const res = await fetch(`${API}/auth/me`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify(payload)
        });
        const out = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(out.message || 'Update failed');

        if (out.user) {
          localStorage.setItem('user', JSON.stringify(out.user));
          // Update header name if component exists
          if (window.updateHeaderName) window.updateHeaderName(out.user.name);
        }
        alert('Details updated!');
        await loadMe();
      } catch (e) {
        alert(e.message);
      } finally {
        btn.disabled = false;
        btn.innerText = 'Save changes';
      }
    }

    loadMe();
  </script>
</body>
</html>
