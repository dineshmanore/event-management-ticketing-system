<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plays — ShowTime</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/category-pages.css">
  <link rel="stylesheet" href="styles/cards.css">
  <style>
    .play-card { background: white; border-radius: 14px; overflow: hidden; border: 1px solid #e0e0e0; cursor: pointer; transition: transform .2s, box-shadow .2s; display: flex; gap: 0; }
    .play-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,.1); }
    .play-poster { width: 170px; min-height: 250px; flex-shrink: 0; object-fit: cover; object-position: center top; }
    .play-poster-placeholder { width: 170px; min-height: 250px; display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0; }
    .play-body { padding: 18px; flex: 1; }
    .play-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .play-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .play-meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .play-tag { background: #f5f5f5; color: #555; font-size: 12px; padding: 4px 10px; border-radius: 4px; }
    .plays-list { display: flex; flex-direction: column; gap: 16px; }
    .lang-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  </style>
</head>
<body>

<header id="header"></header>

<div class="cat-hero" style="background:linear-gradient(135deg,#1a0a2e,#2b1a4e)">
  <div class="cat-hero-overlay" style="background:linear-gradient(to top,rgba(0,0,0,.7),rgba(0,0,0,.2))"></div>
  <div class="cat-hero-content">
    <h1><i class="fa fa-theater-masks" style="margin-right:12px;color:#cc0c39"></i>Plays & Theatre</h1>
    <p>Dramas, Musicals, Stand-up Comedy, and more on stage near you</p>
  </div>
</div>

<div class="city-banner">
  <div><strong id="cityLabel">All Plays</strong><p>Live theatre experiences across all cities</p></div>
  <select onchange="filterCity(this.value)" style="padding:8px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:white;font-family:'Poppins',sans-serif;cursor:pointer;font-size:13px">
    <option value="all" selected>All Cities</option>
    <option value="Mumbai">Mumbai</option>
    <option value="Delhi">Delhi</option>
    <option value="Bangalore">Bangalore</option>
    <option value="Pune">Pune</option>
    <option value="Chennai">Chennai</option>
  </select>
</div>

<div class="filter-strip">
  <label>Type:</label>
  <button class="filter-chip active" onclick="filterCat(this,'all')">All</button>
  <button class="filter-chip" onclick="filterCat(this,'play')">Drama</button>
  <button class="filter-chip" onclick="filterCat(this,'comedy')">Stand-up</button>
  <button class="filter-chip" onclick="filterCat(this,'musical')">Musical</button>
  <button class="filter-chip" onclick="filterCat(this,'children')">Kids</button>
</div>

<div class="search-row">
  <i class="fa fa-search" style="color:#aaa"></i>
  <input class="search-input" placeholder="Search plays..." oninput="searchPlays(this.value)">
  <select class="sort-select" onchange="sortPlays(this.value)">
    <option value="date">Soonest First</option>
    <option value="price">Price: Low to High</option>
    <option value="title">A to Z</option>
  </select>
</div>

<div class="content-wrap">
  <div class="results-count" id="resultsCount">Loading plays...</div>
  <div class="plays-list" id="playsList"></div>
</div>

<footer id="footer"></footer>

<script src="components/header.js"></script>
<script src="components/footer.js"></script>
<script>
const API = 'https://event-management-ticketing-system.onrender.com/api';
let allPlays = [], activeCat = 'all', activeCity = 'all', sortBy = 'date';

const bgColors = { play:'#1a0a2e', comedy:'#2e1a00', musical:'#001a2e', children:'#002e1a', event:'#1a0a2e' };

async function init() {
  try {
    const res = await fetch(`${API}/events`);
    const all = await res.json();
    allPlays = all.filter(e => ['play','comedy','musical','children'].includes(e.category));
    render();
  } catch(e) {
    document.getElementById('playsList').innerHTML = `<div style="text-align:center;padding:60px;color:#888"><i class="fa fa-theater-masks" style="font-size:60px;display:block;margin-bottom:16px;color:#ddd"></i><h3>Plays coming soon!</h3></div>`;
  }
}

function render() {
  let list = [...allPlays];
  if (activeCat !== 'all') list = list.filter(e => e.category === activeCat);
  if (activeCity !== 'all') list = list.filter(e => e.city === activeCity);
  if (sortBy === 'date')  list.sort((a,b) => new Date(a.date) - new Date(b.date));
  if (sortBy === 'price') list.sort((a,b) => a.price_from - b.price_from);
  if (sortBy === 'title') list.sort((a,b) => a.title.localeCompare(b.title));

  const container = document.getElementById('playsList');
  document.getElementById('resultsCount').innerHTML = `<span>${list.length}</span> plays found`;

  if (!list.length) {
    container.innerHTML = `<div style="text-align:center;padding:60px;background:white;border-radius:12px;border:1px solid #eee"><i class="fa fa-theater-masks" style="font-size:56px;color:#ddd;display:block;margin-bottom:16px"></i><h3 style="color:#555">No plays found</h3><p style="color:#aaa">Try selecting a different city or type.</p></div>`;
    return;
  }
  container.innerHTML = list.map(p => playCard(p)).join('');
}

function playCard(e) {
  const bg = bgColors[e.category] || '#1a0a2e';
  const d  = e.date ? new Date(e.date).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'}) : 'Date TBA';
  const img = e.image
    ? `<img class="play-poster" src="${e.image}" alt="${e.title}" onerror="this.outerHTML='<div class=play-poster-placeholder style=background:${bg};color:rgba(255,255,255,.4)><i class=fa fa-theater-masks></i></div>'">`
    : `<div class="play-poster-placeholder" style="background:${bg};color:rgba(255,255,255,.4)"><i class="fa fa-theater-masks"></i></div>`;

  return `<div class="play-card" onclick="localStorage.setItem('selectedEventId', '${e.id}'); window.location.href='event-booking.html?id=${e.id}'">
    ${img}
    <div class="play-body">
      <div class="play-title">${e.title}</div>
      <div class="play-desc">${e.description || 'A wonderful theatrical experience.'}</div>
      <div class="play-meta-row">
        <span class="play-tag"><i class="fa fa-calendar" style="margin-right:5px;color:#cc0c39"></i>${d}</span>
        <span class="play-tag"><i class="fa fa-clock" style="margin-right:5px;color:#cc0c39"></i>${e.time || 'TBA'}</span>
        <span class="play-tag"><i class="fa fa-map-marker-alt" style="margin-right:5px;color:#cc0c39"></i>${e.venue || ''}</span>
        ${e.language ? `<span class="play-tag">${e.language}</span>` : ''}
        ${e.age_limit ? `<span class="play-tag">${e.age_limit}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:16px;font-weight:700">₹${e.price_from}${e.price_to && e.price_to !== e.price_from ? ' — ₹'+e.price_to : ''} <span style="font-size:12px;font-weight:400;color:#888">onwards</span></div>
        <button class="book-btn">Book Tickets</button>
      </div>
    </div>
  </div>`;
}

function filterCat(btn, cat) {
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  activeCat = cat;
  render();
}

function filterCity(city) {
  activeCity = city;
  document.getElementById('cityLabel').innerText = `Plays in ${city}`;
  render();
}

function sortPlays(val) { sortBy = val; render(); }

function searchPlays(q) {
  if (!q.trim()) { render(); return; }
  const f = allPlays.filter(e => 
    e.title.toLowerCase().includes(q.toLowerCase()) ||
    (e.venue && e.venue.toLowerCase().includes(q.toLowerCase())) ||
    (e.city && e.city.toLowerCase().includes(q.toLowerCase()))
  );
  document.getElementById('resultsCount').innerHTML = `<span>${f.length}</span> results for "${q}"`;
  const list = document.getElementById('playsList');
  if (f.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:60px;background:white;border-radius:12px;border:1px solid #eee"><i class="fa fa-search" style="font-size:56px;color:#ddd;display:block;margin-bottom:16px"></i><h3 style="color:#555">No results</h3><p style="color:#aaa">Try searching for something else.</p></div>`;
  } else {
    list.innerHTML = f.map(p => playCard(p)).join('');
  }
}

init();
</script>
</body>
</html>
